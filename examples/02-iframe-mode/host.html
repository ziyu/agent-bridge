<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AgentBridge - Iframe Mode (Host)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 24px; background: #f5f5f5; }
    h1 { margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 24px; }
    .panel { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    .panel h2 { font-size: 14px; color: #999; text-transform: uppercase; margin-bottom: 12px; }
    #sandbox-container { width: 100%; height: 240px; border: 2px dashed #ddd; border-radius: 8px; overflow: hidden; }
    #sandbox-container iframe { border: none; }
    #log { font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; }
    #log div { padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
    .log-host { color: #2563eb; }
    .log-guest { color: #16a34a; }
    .log-error { color: #dc2626; }
    button { padding: 8px 16px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; margin-right: 8px; margin-bottom: 8px; }
    button:hover { background: #f0f0f0; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type="text"] { font-family: system-ui, sans-serif; }
    ul { list-style: disc; }
  </style>
</head>
<body>
  <h1>02 - Iframe Mode</h1>
  <p class="desc">Host mounts a remote guest app via iframe URL. The guest page (guest.html) must include the Client SDK independently.</p>

  <div class="panel">
    <h2>Controls</h2>
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 12px;">
      <span id="state-indicator" style="display: inline-flex; align-items: center; gap: 6px; font-size: 13px;">
        <span id="state-dot" style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #ccc;"></span>
        <span id="state-text">disconnected</span>
      </span>
    </div>
    <div>
      <button id="btn-mount">Mount Guest (iframe)</button>
      <button id="btn-get-time" disabled>Call getTime()</button>
      <button id="btn-toggle" disabled>Call toggleTheme()</button>
      <button id="btn-unmount" disabled>Unmount</button>
      <button id="btn-reconnect" style="display: none;">Reconnect</button>
    </div>
    <div style="margin-top: 12px;">
      <label style="display: block; margin-bottom: 6px; font-size: 13px;">Timezone for getTime():</label>
      <input type="text" id="timezone-input" value="UTC" style="padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; width: 200px;">
    </div>
    <div id="capabilities-panel" style="margin-top: 12px; display: none; padding: 12px; background: #f9f9f9; border-left: 3px solid #2563eb; border-radius: 4px;">
      <p style="font-size: 12px; color: #666; margin-bottom: 6px;">Available Capabilities:</p>
      <ul id="capabilities-list" style="margin-left: 20px; font-size: 12px; color: #333;"></ul>
    </div>
  </div>

  <div class="panel">
    <h2>Sandbox (iframe)</h2>
    <div id="sandbox-container"></div>
  </div>

  <div class="panel">
    <h2>Event Log</h2>
    <div id="log"></div>
  </div>

  <script type="module">
    import { AgentBridgeHost } from '../../packages/host/dist/index.mjs';

    const log = document.getElementById('log');
    const btnMount = document.getElementById('btn-mount');
    const btnGetTime = document.getElementById('btn-get-time');
    const btnToggle = document.getElementById('btn-toggle');
    const btnUnmount = document.getElementById('btn-unmount');
    const btnReconnect = document.getElementById('btn-reconnect');
    const timezoneInput = document.getElementById('timezone-input');
    const stateDot = document.getElementById('state-dot');
    const stateText = document.getElementById('state-text');
    const capabilitiesPanel = document.getElementById('capabilities-panel');
    const capabilitiesList = document.getElementById('capabilities-list');

    function addLog(msg, cls = 'log-host') {
      const d = document.createElement('div');
      d.className = cls;
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      log.prepend(d);
    }

    function updateStateIndicator(state) {
      const colors = { connected: '#16a34a', connecting: '#f59e0b', disconnected: '#ccc' };
      const labels = { connected: 'connected', connecting: 'connecting...', disconnected: 'disconnected' };
      stateDot.style.background = colors[state] || colors.disconnected;
      stateText.textContent = labels[state] || 'disconnected';
    }

    const host = new AgentBridgeHost();
    let connectionId = null;

    function autoMount() {
      btnMount.click();
    }

    window.addEventListener('load', autoMount);

    btnMount.addEventListener('click', async () => {
      try {
        addLog('Mounting guest via iframe (guest.html)...');
        updateStateIndicator('connecting');
        btnMount.disabled = true;

        const conn = await host.mount(
          { type: 'uri', url: './guest.html' },
          {
            container: document.getElementById('sandbox-container'),
            allowedOrigins: ['*'],
          }
        );
        connectionId = conn.id;
        addLog('Connected! id=' + connectionId);

        conn.on('stateChange', (state) => {
          if (state === 'connected') {
            updateStateIndicator('connected');
          } else if (state === 'disconnected') {
            updateStateIndicator('disconnected');
          }
        });

        conn.on('capabilities', (caps) => {
          addLog('Guest capabilities: ' + caps.map(c => c.name).join(', '));
          capabilitiesList.innerHTML = '';
          caps.forEach(cap => {
            const li = document.createElement('li');
            li.textContent = cap.name;
            capabilitiesList.appendChild(li);
          });
          capabilitiesPanel.style.display = 'block';
          btnGetTime.disabled = false;
          btnToggle.disabled = false;
        });

        conn.on('notification', (evt) => {
          addLog(`Notification [${evt.eventName}]: ${JSON.stringify(evt.eventData)}`, 'log-guest');
        });

        conn.on('stateSync', (snapshot) => {
          addLog('State: ' + JSON.stringify(snapshot), 'log-guest');
        });

        updateStateIndicator('connected');
        btnUnmount.disabled = false;
        btnReconnect.style.display = 'none';
      } catch (err) {
        addLog('Mount failed: ' + err.message, 'log-error');
        updateStateIndicator('disconnected');
        btnMount.disabled = false;
      }
    });

    btnGetTime.addEventListener('click', async () => {
      try {
        const tz = timezoneInput.value || 'UTC';
        addLog(`Calling getTime({ timezone: "${tz}" })...`);
        const result = await host.executeAction(connectionId, 'getTime', { timezone: tz });
        addLog('Result: ' + JSON.stringify(result));
      } catch (err) {
        addLog('Error: ' + err.message, 'log-error');
      }
    });

    btnToggle.addEventListener('click', async () => {
      try {
        addLog('Calling toggleTheme()...');
        const result = await host.executeAction(connectionId, 'toggleTheme', {});
        addLog('Result: ' + JSON.stringify(result));
      } catch (err) {
        addLog('Error: ' + err.message, 'log-error');
      }
    });

    btnUnmount.addEventListener('click', () => {
      host.unmount(connectionId);
      connectionId = null;
      addLog('Guest unmounted');
      updateStateIndicator('disconnected');
      btnMount.disabled = false;
      btnGetTime.disabled = true;
      btnToggle.disabled = true;
      btnUnmount.disabled = true;
      btnReconnect.style.display = 'inline-block';
      capabilitiesPanel.style.display = 'none';
    });

    btnReconnect.addEventListener('click', () => {
      btnReconnect.style.display = 'none';
      btnMount.click();
    });
  </script>
</body>
</html>
